<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button color="medium"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="admin-content">
  <div class="admin-wrapper">

    <!-- Page heading -->
    <div class="page-heading">
      <h1 class="page-title">Administración</h1>
      <p class="page-sub">Panel de gestión general y métricas en tiempo real</p>
    </div>

    <!-- Global error message (if any) -->
    <div class="global-error" *ngIf="state.error">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span>{{ state.error }}</span>
    </div>

    <!-- 1. Alertas del Sistema -->
    <div class="dashboard-section alert-section">
      <app-alert-panel [alertas]="state.alertas" [error]="state.error"></app-alert-panel>
    </div>

    <!-- 2. KPI Cards Grid -->
    <div class="kpi-grid">
      <app-kpi-card *ngFor="let kpi of state.kpis" [config]="kpi"></app-kpi-card>
    </div>

    <!-- 3. Charts Grid (Ocupación, Reservas, Top Horarios) -->
    <div class="charts-grid">
      <app-chart-bar [data]="state.chartOcupacion" title="Ocupación por Horas"></app-chart-bar>
      <app-chart-line [data]="state.chartReservasSemana" title="Reservas de la Semana"></app-chart-line>
      <app-chart-hbar [data]="state.chartTopHorarios" title="Top 5 Demandados (SVG)"></app-chart-hbar>
    </div>

    <!-- 4. Fila Media: Calendario y Tabla de Reservas -->
    <div class="mid-grid">
      <app-calendar-view></app-calendar-view>
      <app-reservas-table
        [reservas]="state.reservasRecientes"
        [error]="state.error"
        (confirmarAsistencia)="onConfirmarAsistencia($event, rTable)"
        (cancelarReserva)="onCancelarReserva($event)"
        #rTable>
      </app-reservas-table>
    </div>

    <!-- 5. Fila Inferior: Pagos, Planes y Clientes Inactivos -->
    <div class="bottom-grid">
      <app-pagos-panel [pagos]="state.pagosRecientes" [error]="state.error"></app-pagos-panel>
      <app-planes-panel [clientes]="state.planesPorVencer" [error]="state.error" (retry)="reloadPlanes()"></app-planes-panel>
      <app-clientes-inactivos [clientes]="state.clientesInactivos" [error]="state.error"></app-clientes-inactivos>
    </div>

    <!-- 6. Fila Final: Horarios Demanda y Acciones Rápidas -->
    <div class="footer-grid">
      <app-horarios-demanda [horarios]="state.horariosDemanda" [error]="state.error"></app-horarios-demanda>
      <app-quick-actions [generatingHorarios]="generatingHorarios" (generarHorarios)="onGenerarHorarios()"></app-quick-actions>
    </div>

  </div>
</ion-content>
