<ion-content class="registro-content" fullscreen>
  <div class="auth-layout">

    <section class="brand-panel">
      <div class="brand-box">
        <div class="logo-icon green">≋</div>
        <h1>ÚNETE A<br><span>OLYMPO</span></h1>
        <p>Comienza tu transformación con el mejor acompañamiento profesional</p>
      </div>
    </section>

    <section class="form-panel">
      <div class="form-box register-form-box">
        <h2>Crear Cuenta</h2>
        <p class="subtitle">Completa tus datos para registrarte</p>

        <div *ngIf="errorMessage" class="error-box">
          {{ errorMessage }}
        </div>

        <form [formGroup]="formRegister" (ngSubmit)="onSubmit()">

          <div class="form-grid">
            <div>
              <label>RUT</label>
              <ion-item class="input-box" lines="none">
                <ion-icon name="card" slot="start"></ion-icon>
                <ion-input formControlName="rut" placeholder="12.345.678-9"></ion-input>
              </ion-item>
            </div>

            <div>
              <label>Teléfono</label>
              <ion-item class="input-box" lines="none">
                <ion-icon name="call" slot="start"></ion-icon>
                <ion-input formControlName="telefono" placeholder="+56 9 1234 5678"></ion-input>
              </ion-item>
            </div>

            <div>
              <label>Nombre</label>
              <ion-item class="input-box" lines="none">
                <ion-icon name="person" slot="start"></ion-icon>
                <ion-input formControlName="nombre" placeholder="Tu nombre"></ion-input>
              </ion-item>
            </div>

            <div>
              <label>Apellido</label>
              <ion-item class="input-box" lines="none">
                <ion-icon name="person" slot="start"></ion-icon>
                <ion-input formControlName="apellido" placeholder="Tu apellido"></ion-input>
              </ion-item>
            </div>
          </div>

          <label>Correo electrónico</label>
          <ion-item class="input-box" lines="none">
            <ion-icon name="mail" slot="start"></ion-icon>
            <ion-input type="email" formControlName="email" placeholder="correo@ejemplo.com"></ion-input>
          </ion-item>

          <div class="form-grid">
            <div>
              <label>Contraseña</label>
              <ion-item class="input-box" lines="none">
                <ion-icon name="lock-closed" slot="start"></ion-icon>
                <ion-input type="password" formControlName="password" placeholder="********"></ion-input>
              </ion-item>
            </div>

            <div>
              <label>Confirmar contraseña</label>
              <ion-item class="input-box" lines="none">
                <ion-icon name="lock-closed" slot="start"></ion-icon>
                <ion-input type="password" formControlName="confirmPassword" placeholder="********"></ion-input>
              </ion-item>
            </div>
          </div>

          <div
            *ngIf="formRegister?.hasError('passwordMismatch') && formRegister?.get('confirmPassword')?.dirty"
            class="error-inline">
            Las contraseñas no coinciden.
          </div>

          <ion-button
            expand="block"
            type="submit"
            class="btn-registro"
            [disabled]="!formRegister.valid || loading">
            {{ loading ? 'Registrando...' : 'Crear mi cuenta' }}
          </ion-button>
        </form>

        <div class="login-box">
          ¿Ya tienes cuenta?
          <a routerLink="/login">Iniciar sesión</a>
        </div>
      </div>
    </section>

  </div>
</ion-content>
